<!DOCTYPE html>
<html>
<head>
    <title>HCTC Database Cleanup</title>
    <style>
        body { font-family: -apple-system, system-ui; padding: 40px; line-height: 1.5; color: #1c1c1e; }
        .card { background: #f2f2f7; padding: 24px; border-radius: 12px; max-width: 500px; margin: 0 auto; border: 1px solid #e5e5ea; }
        h1 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
        p { font-size: 14px; color: #8e8e93; margin-bottom: 24px; }
        button { background: #ff3b30; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; font-size: 15px; }
        button:disabled { background: #c7c7cc; cursor: not-allowed; }
        pre { background: #000; color: #00ff00; padding: 16px; border-radius: 8px; font-size: 12px; overflow-y: auto; max-height: 300px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚨 Database Purge Tool</h1>
        <p>This will delete ALL users and applications from Firestore. Tournament configurations will be preserved.</p>
        <button id="btn-start">💣 START CLEANUP</button>
        <pre id="log">Waiting to start...</pre>
    </div>

    <!-- Firebase v9+ Client SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        // CONFIG (Populated from .env.local)
        const firebaseConfig = {
            apiKey: "AIzaSyAjRBSpbmTnW1kTCbZhGJRE3N7SXI8HvpI",
            authDomain: "hctcplayer.firebaseapp.com",
            projectId: "hctcplayer",
            storageBucket: "hctcplayer.firebasestorage.app",
            messagingSenderId: "910218737548",
            appId: "1:910218737548:web:5d4405e8c3d29508d408a9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const logEl = document.getElementById('log');
        const btn = document.getElementById('btn-start');

        function appendLog(msg) {
            logEl.textContent += `\n${msg}`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function purgeCollection(name) {
            appendLog(`📡 Fetching ${name}...`);
            const colRef = collection(db, name);
            const snapshot = await getDocs(colRef);
            
            if (snapshot.empty) {
                appendLog(`✅ ${name} is already empty.`);
                return;
            }

            appendLog(`🔥 Deleting ${snapshot.size} docs from ${name}...`);
            const promises = snapshot.docs.map(d => deleteDoc(doc(db, name, d.id)));
            await Promise.all(promises);
            appendLog(`✅ Purged ${name}.`);
        }

        btn.onclick = async () => {
            if (!confirm("Are you SURE? This cannot be undone!")) return;
            btn.disabled = true;
            btn.textContent = "🔥 PURGING...";
            logEl.textContent = "🚀 Starting cleanup...";

            try {
                await purgeCollection("users");
                await purgeCollection("tournamentApplications");
                appendLog("\n✨ DATABASE CLEANUP SUCCESSFUL ✨");
                btn.textContent = "✅ DONE";
            } catch (err) {
                appendLog(`\n❌ ERROR: ${err.message}`);
                console.error(err);
                btn.disabled = false;
                btn.textContent = "💣 RETRY CLEANUP";
            }
        };
    </script>
</body>
</html>
